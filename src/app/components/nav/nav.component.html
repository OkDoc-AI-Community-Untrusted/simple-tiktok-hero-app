<ion-header *ngIf="isAuthenticated">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>TikTok Hero App</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="onLogout()" fill="clear">
        <ion-icon slot="icon-only" name="log-out"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-menu-toggle *ngIf="isAuthenticated">
  <ion-menu side="start" contentId="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <div class="user-info">
        <div class="user-avatar">
          <img
            *ngIf="currentUser?.profileImageUrl"
            [src]="currentUser.profileImageUrl"
            alt="Profile"
          />
          <ion-icon *ngIf="!currentUser?.profileImageUrl" name="person"></ion-icon>
        </div>
        <div class="user-details">
          <p class="username">@{{ currentUser?.username }}</p>
          <p class="display-name">{{ displayName }}</p>
        </div>
      </div>

      <ion-list>
        <ion-item>
          <ion-label>Create Post</ion-label>
          <ion-icon slot="start" name="document"></ion-icon>
        </ion-item>
        <ion-item button (click)="onLogout()">
          <ion-label color="danger">Logout</ion-label>
          <ion-icon slot="start" name="log-out" color="danger"></ion-icon>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>
</ion-menu-toggle>
