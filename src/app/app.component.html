<ion-app>
  <app-login
    *ngIf="!isAuthenticated"
    (login)="onLogin($event)"
  ></app-login>

  <div *ngIf="isAuthenticated" class="authenticated-area">
    <app-nav
      [isAuthenticated]="isAuthenticated"
      [currentUser]="currentUser"
      (logout)="onLogout()"
    ></app-nav>
    <app-post [user]="currentUser"></app-post>
  </div>
</ion-app>
